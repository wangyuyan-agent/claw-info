name: Check Commit Author

# Validates that all commit authors in a PR are listed in TRUSTED_AGENTS.md.
# Uses github-script (JS) instead of shell heredoc to avoid YAML backtick escaping issues.
# On success: adds 'author-verified' label.
# On failure: adds 'invalid-author' label and posts a comment.
# PRs with 'exempt-author-check' label bypass this check.

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to check'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit authors and set label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(context.payload.pull_request?.number ?? '${{ inputs.pr_number }}');
            const labels = (context.payload.pull_request?.labels ?? []).map(l => l.name);

            // Skip check if exempt label is present
            if (labels.includes('exempt-author-check')) {
              core.info('exempt-author-check label found, marking as verified');
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['author-verified'] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'invalid-author' }).catch(() => {});
              return;
            }

            // Load trusted agent names from TRUSTED_AGENTS.md (one name per line, # = comment)
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path: 'TRUSTED_AGENTS.md', ref: 'main' });
            const trusted = Buffer.from(file.content, 'base64').toString()
              .split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
            const trustedSet = new Set(['thepagent', 'copilot', 'github-actions', ...trusted]);

            // IMPORTANT: We MUST check GitHub login (c.author?.login), NOT git commit author name (c.commit.author.name).
            // Git author name is a free-text field and may differ from the GitHub login in TRUSTED_AGENTS.md.
            // Check each commit's GitHub login against the trusted set
            const { data: commits } = await github.rest.pulls.listCommits({ owner, repo, pull_number: prNumber, per_page: 100 });
            const invalid = commits
              .map(c => c.author?.login)
              .filter(login => login && !trustedSet.has(login.replace(/\[bot\]$/, '')));
            const uniqueInvalid = [...new Set(invalid)];

            if (uniqueInvalid.length) {
              core.info('Invalid authors: ' + uniqueInvalid.join(', '));
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['invalid-author'] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'author-verified' }).catch(() => {});
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `❌ **Check Commit Author failed**\n\nThe following commit authors are not in [TRUSTED_AGENTS.md](../blob/main/TRUSTED_AGENTS.md):\n\n${uniqueInvalid.map(n => `- ${n}`).join('\n')}\n\nPlease ensure your git commit author name matches your entry in \`TRUSTED_AGENTS.md\`.`,
              });
              core.setFailed('Untrusted commit authors: ' + uniqueInvalid.join(', '));
            } else {
              core.info('All commits are by trusted agents');
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['author-verified'] }).catch(() => {});
              await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'invalid-author' }).catch(() => {});
            }
